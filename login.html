<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#0a0f1f,#05070a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* Glass Card */
.auth-box{
  width:420px;
  padding:45px;
  background:rgba(10,15,30,0.88);
  border-radius:22px;
  border:1.8px solid #00e0ff;
  box-shadow:0 0 65px rgba(0,224,255,0.45);
  text-align:center;
  position:relative;
}

/* Glow border */
.auth-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(90deg,#00e0ff,transparent,#00e0ff);
  opacity:0.28;
  filter:blur(18px);
  z-index:-1;
}

.auth-box h2{
  margin-bottom:28px;
  color:#00e0ff;
  letter-spacing:1.2px;
  font-size:26px;
}

.input-group{
  text-align:left;
  margin-bottom:20px;
}

.input-group label{
  font-size:15px;
  color:#00e0ff;
  letter-spacing:1px;
}

.input-group input{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1.3px solid rgba(0,224,255,0.45);
  background:#05070a;
  color:white;
  outline:none;
  font-size:16px;
  box-shadow:inset 0 0 12px rgba(0,224,255,0.18);
}

.input-group input:focus{
  box-shadow:0 0 18px rgba(0,224,255,0.8);
  border:1.5px solid #00e0ff;
}

.auth-btn{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#00e0ff,#0077ff);
  color:black;
  font-weight:800;
  letter-spacing:1.2px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  box-shadow:0 0 35px rgba(0,224,255,0.65);
}

.auth-btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 55px rgba(0,224,255,0.95);
}

.link-text{
  margin-top:22px;
  font-size:15px;
  color:#ccc;
}

.link-text a{
  color:#00e0ff;
  text-decoration:none;
  font-weight:700;
}

.link-text a:hover{
  text-decoration:underline;
}
</style>
</head>

<body style="background:#fff;">
  <div style="min-height:100vh;display:flex;align-items:stretch;justify-content:center;">
    <!-- Left: Car image with overlay -->
    <div style="flex:1;min-width:340px;max-width:600px;background:linear-gradient(120deg,#b721ff99,#21d4fd99),url('https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=800&q=80') center center/cover no-repeat;border-top-left-radius:12px;border-bottom-left-radius:12px;display:flex;align-items:center;justify-content:center;">
      <!-- Optionally, add a logo or text here -->
    </div>
    <!-- Right: Form -->
    <div style="flex:1;max-width:480px;min-width:340px;background:#fff;display:flex;align-items:center;justify-content:center;border-top-right-radius:12px;border-bottom-right-radius:12px;box-shadow:0 0 40px #0002;">
      <div class="auth-box" style="width:100%;max-width:370px;padding:40px 32px;margin:0;background:transparent;box-shadow:none;border:none;">
        <h2 style="color:#b721ff;">Sign In</h2>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Email address..">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="************">
        </div>
        <button class="auth-btn" style="background:linear-gradient(90deg,#b721ff,#21d4fd);color:#fff;" onclick="login()">Sign in</button>
        <div class="link-text" style="margin-top:18px;">
          <a href="signup.html">Create account →</a>
        </div>
      </div>
    </div>
  </div>
<script>
function login(){
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;
  if(email==="" || pass===""){
    alert("Please fill all fields");
  }else{
    alert("Login Successful (UI demo)");
  }
}
</script>
</body>
</html>
