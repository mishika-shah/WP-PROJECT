<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#0a0f1f,#05070a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* Glass Card */
.auth-box{
  width:420px;
  padding:45px;
  background:rgba(10,15,30,0.88);
  border-radius:22px;
  border:1.8px solid #00e0ff;
  box-shadow:0 0 65px rgba(0,224,255,0.45);
  text-align:center;
  position:relative;
}

/* Glow border */
.auth-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(90deg,#00e0ff,transparent,#00e0ff);
  opacity:0.28;
  filter:blur(18px);
  z-index:-1;
}

.auth-box h2{
  margin-bottom:28px;
  color:#00e0ff;
  letter-spacing:1.2px;
  font-size:26px;
}

.input-group{
  text-align:left;
  margin-bottom:20px;
}

.input-group label{
  font-size:15px;
  color:#00e0ff;
  letter-spacing:1px;
}

.input-group input{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1.3px solid rgba(0,224,255,0.45);
  background:#05070a;
  color:white;
  outline:none;
  font-size:16px;
  box-shadow:inset 0 0 12px rgba(0,224,255,0.18);
}

.input-group input:focus{
  box-shadow:0 0 18px rgba(0,224,255,0.8);
  border:1.5px solid #00e0ff;
}

.auth-btn{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#00e0ff,#0077ff);
  color:black;
  font-weight:800;
  letter-spacing:1.2px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  box-shadow:0 0 35px rgba(0,224,255,0.65);
}

.auth-btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 55px rgba(0,224,255,0.95);
}

.link-text{
  margin-top:22px;
  font-size:15px;
  color:#ccc;
}

.link-text a{
  color:#00e0ff;
  text-decoration:none;
  font-weight:700;
}

.link-text a:hover{
  text-decoration:underline;
}
</style>
</head>

<body style="position:relative;min-height:100vh;overflow:hidden;">
  <!-- Blurred homepage background -->
  <iframe src="homepage.html" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;filter:blur(8px) brightness(0.7);opacity:0.45;pointer-events:none;border:none;"></iframe>
  <div style="position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div style="display:flex;box-shadow:0 0 65px rgba(0,224,255,0.25);border-radius:22px;overflow:hidden;border:2.5px solid #00e0ff;background:rgba(10,15,30,0.92);">
      <!-- Left: Car image with overlay -->
      <div style="flex:1.3;min-width:420px;max-width:750px;display:flex;align-items:center;justify-content:center;position:relative;">
        <div style="width:100%;height:540px;max-width:750px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;">
          <img src="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=1200&q=80" alt="Car" style="width:110%;height:540px;object-fit:cover;object-position:center;filter:brightness(0.7) saturate(1.2);">
          <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(120deg,#0a0f1fcc 60%,#00e0ff55 100%);"></div>
        </div>
      </div>
      <!-- Right: Form -->
      <div style="flex:1;max-width:480px;min-width:340px;display:flex;align-items:center;justify-content:center;background:rgba(10,15,30,0.88);">
        <div class="auth-box" style="box-shadow:none;border:none;background:transparent;padding:48px 36px 36px 36px;max-width:370px;width:100%;border-radius:18px;">
          <h2 style="color:#00e0ff;margin-bottom:32px;letter-spacing:1.2px;font-size:28px;">Sign In</h2>
          <div class="input-group" style="margin-bottom:24px;">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Email address..">
          </div>
          <div class="input-group" style="margin-bottom:28px;">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="************">
          </div>
          <button class="auth-btn" style="background:linear-gradient(90deg,#00e0ff,#0077ff);color:#fff;font-size:17px;padding:15px 0;margin-top:8px;border-radius:12px;transition:box-shadow 0.2s,transform 0.2s;box-shadow:0 0 18px #00e0ff44;" onmouseover="this.style.boxShadow='0 0 38px #00e0ff99';this.style.transform='scale(1.03)';" onmouseout="this.style.boxShadow='0 0 18px #00e0ff44';this.style.transform='scale(1)';" onclick="login()">Sign in</button>
          <div class="link-text" style="margin-top:24px;">
            <a href="signup.html">Create account →</a>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
async function login() {
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;
  if (email === "" || pass === "") {
    alert("Please fill all fields");
    return;
  }
  try {
    // Fetch username by email first (since backend expects username)
    const resUser = await fetch('http://localhost:3000/signup', {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });
    // But since you don't have a GET /user-by-email endpoint, we'll assume username == email (or ask user to enter username)
    // For now, try login with email as username
    const res = await fetch('http://localhost:3000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, password: pass })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('token', data.token);
      window.location.href = "homepage.html";
    } else {
      alert(data.message || "Login failed");
    }
  } catch (err) {
    alert("Network error. Please try again.");
  }
}
</script>
</body>
</html>
