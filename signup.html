<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Sign Up</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#0a0f1f,#05070a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* Glass Card */
.auth-box{
  width:450px;
  padding:45px;
  background:rgba(10,15,30,0.88);
  border-radius:22px;
  border:1.8px solid #00e0ff;
  box-shadow:0 0 65px rgba(0,224,255,0.45);
  text-align:center;
  position:relative;
}

/* Glow */
.auth-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(90deg,#00e0ff,transparent,#00e0ff);
  opacity:0.28;
  filter:blur(18px);
  z-index:-1;
}

.auth-box h2{
  margin-bottom:28px;
  color:#00e0ff;
  letter-spacing:1.2px;
  font-size:26px;
}

.input-group{
  text-align:left;
  margin-bottom:18px;
}

.input-group label{
  font-size:15px;
  color:#00e0ff;
  letter-spacing:1px;
}

.input-group input{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1.3px solid rgba(0,224,255,0.45);
  background:#05070a;
  color:white;
  outline:none;
  font-size:16px;
  box-shadow:inset 0 0 12px rgba(0,224,255,0.18);
}

.input-group input:focus{
  box-shadow:0 0 18px rgba(0,224,255,0.8);
  border:1.5px solid #00e0ff;
}

.auth-btn{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#00e0ff,#0077ff);
  color:black;
  font-weight:800;
  letter-spacing:1.2px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  box-shadow:0 0 35px rgba(0,224,255,0.65);
}

.auth-btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 55px rgba(0,224,255,0.95);
}

.link-text{
  margin-top:22px;
  font-size:15px;
  color:#ccc;
}

.link-text a{
  color:#00e0ff;
  text-decoration:none;
  font-weight:700;
}

.link-text a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="auth-box">
  <h2>Create AutoSphere Account</h2>

  <div class="input-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create password">
  </div>

  <div class="input-group">
    <label>Confirm Password</label>
    <input type="password" id="cpassword" placeholder="Confirm password">
  </div>

  <button class="auth-btn" onclick="signup()">Sign Up</button>

  <div class="link-text">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
function signup(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const cpass = document.getElementById("cpassword").value;

  if(name===""||email===""||pass===""||cpass===""){
    alert("Please fill all fields");
  }
  else if(pass!==cpass){
    alert("Passwords do not match");
  }
  else{
    alert("Account Created Successfully (UI demo)");
  }
}
</script>

</body>
</html>
