<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Sign Up</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#0a0f1f,#05070a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* Glass Card */
.auth-box{
  width:450px;
  padding:45px;
  background:rgba(10,15,30,0.88);
  border-radius:22px;
  border:1.8px solid #00e0ff;
  box-shadow:0 0 65px rgba(0,224,255,0.45);
  text-align:center;
  position:relative;
}

/* Glow */
.auth-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(90deg,#00e0ff,transparent,#00e0ff);
  opacity:0.28;
  filter:blur(18px);
  z-index:-1;
}

.auth-box h2{
  margin-bottom:28px;
  color:#00e0ff;
  letter-spacing:1.2px;
  font-size:26px;
}

.input-group{
  text-align:left;
  margin-bottom:18px;
}

.input-group label{
  font-size:15px;
  color:#00e0ff;
  letter-spacing:1px;
}

.input-group input{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1.3px solid rgba(0,224,255,0.45);
  background:#05070a;
  color:white;
  outline:none;
  font-size:16px;
  box-shadow:inset 0 0 12px rgba(0,224,255,0.18);
}

.input-group input:focus{
  box-shadow:0 0 18px rgba(0,224,255,0.8);
  border:1.5px solid #00e0ff;
}

.auth-btn{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#00e0ff,#0077ff);
  color:black;
  font-weight:800;
  letter-spacing:1.2px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
  box-shadow:0 0 35px rgba(0,224,255,0.65);
}

.auth-btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 55px rgba(0,224,255,0.95);
}

.link-text{
  margin-top:22px;
  font-size:15px;
  color:#ccc;
}

.link-text a{
  color:#00e0ff;
  text-decoration:none;
  font-weight:700;
}

.link-text a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#0a0f1f,#05070a);">
    <div style="display:flex;box-shadow:0 0 65px rgba(0,224,255,0.25);border-radius:22px;overflow:hidden;border:2.5px solid #00e0ff;">
      <!-- Car image section, wider -->
      <div style="flex:1.3;min-width:420px;max-width:750px;display:flex;align-items:center;justify-content:center;position:relative;">
        <div style="width:100%;height:540px;max-width:750px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;">
          <img src="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=1200&q=80" alt="Car" style="width:110%;height:540px;object-fit:cover;object-position:center;filter:brightness(0.7) saturate(1.2);">
          <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(120deg,#0a0f1fcc 60%,#00e0ff55 100%);"></div>
        </div>
      </div>
      <!-- Signup form section -->
      <div style="flex:1;max-width:480px;min-width:340px;display:flex;align-items:center;justify-content:center;background:rgba(10,15,30,0.88);">
        <div class="auth-box" style="box-shadow:none;border:none;background:transparent;">
          <h2>Create AutoSphere Account</h2>
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
          </div>
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create password">
          </div>
          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="cpassword" placeholder="Confirm password">
          </div>
          <div style="margin:16px 0 8px 0;text-align:left;">
            <input type="checkbox" id="terms" style="margin-right:8px;"> <label for="terms" style="font-size:13px;color:#00e0ff;">I agree to all Terms of User</label>
          </div>
          <button class="auth-btn" onclick="signup()">Sign Up</button>
          <div class="link-text">
            Already have an account? <a href="login.html">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
function signup(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const cpass = document.getElementById("cpassword").value;
  const terms = document.getElementById("terms").checked;
  if(name===""||email===""||username===""||pass===""||cpass===""){
    alert("Please fill all fields");
  }
  else if(pass!==cpass){
    alert("Passwords do not match");
  }
  else if(!terms){
    alert("Please agree to the terms");
  }
  else{
    alert("Account Created Successfully (UI demo)");
  }
}
</script>
</body>
</html>
