<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoSphere | Skoda Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#05070a;
color:white;
padding:0 6%;
padding-top:110px;
position:relative;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920") center/cover no-repeat;
opacity:0.12;
z-index:-1;
}

/* NAVBAR */
.navbar{
    width:100%;
    padding:15px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(10,15,25,0.9);
    backdrop-filter:blur(10px);
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    border-bottom:1px solid #00e0ff;
}

.logo{
    font-size:28px;
    font-weight:800;
    color:#00e0ff;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(0,224,255,0.8);
}

.nav-links{
    flex:1;
    display:flex;
    justify-content:space-evenly;
}

.nav-links a{
    text-decoration:none;
    color:inherit;
}

.nav-item{
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#e6faff;
    cursor:pointer;
    transition:0.3s;
}

.nav-item:hover{
    color:#00e0ff;
    text-shadow:0 0 10px rgba(0,224,255,0.8);
}

.profile{
    padding:10px 18px;
    border:2px solid #00e0ff;
    border-radius:25px;
    font-size:14px;
    font-weight:600;
    color:#00e0ff;
    cursor:pointer;
    transition:0.3s;
}

.profile:hover{
    background:#00e0ff;
    color:#05070a;
}

/* TITLE */
.page-title{
text-align:center;
margin-bottom:60px;
}

.page-title h1{
font-size:42px;
color:#00e0ff;
text-shadow:0 0 20px rgba(0,224,255,0.7);
}

.page-title p{
color:#aaa;
margin-top:10px;
}

/* FILTERS */
.filters{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:50px;
flex-wrap:wrap;
gap:30px;
padding:18px 22px;
border-radius:18px;
background:#070b10;
border:1px solid rgba(0,224,255,0.3);
box-shadow:0 0 25px rgba(0,224,255,0.15);
}

#searchInput{
padding:15px 25px;
border-radius:30px;
border:1px solid #00e0ff;
background:#0b0f14;
color:white;
width:420px;
outline:none;
font-size:15px;
box-shadow:0 0 15px rgba(0,224,255,0.3);
}

.price-filter{
display:flex;
flex-direction:column;
gap:6px;
color:#aaa;
font-size:14px;
align-items:center;
}

#priceSlider{
width:240px;
accent-color:#00e0ff;
cursor:pointer;
}

/* GRID */
.car-grid{
display:grid;
grid-template-columns:repeat(auto-fit,300px);
gap:40px;
justify-content:center;
}

/* CARD */
.car-card{
background:linear-gradient(180deg,#0b0f14,#070b10);
border-radius:20px;
border:1px solid rgba(0,224,255,0.6);
overflow:hidden;
box-shadow:0 0 35px rgba(0,224,255,0.25);
transition:0.3s;
max-width:420px;
}

.car-card:hover{
transform:translateY(-10px);
box-shadow:0 0 50px rgba(0,224,255,0.5);
}

.car-img img{
width:100%;
height:200px;
object-fit:cover;
}

.car-content{
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.car-title{
font-size:22px;
font-weight:700;
color:#00e0ff;
}

.car-info{
font-size:14px;
color:#bbb;
}

.car-price{
font-size:18px;
font-weight:700;
color:#00ff9c;
margin-top:6px;
}

.details-btn{
margin-top:12px;
padding:12px;
border-radius:30px;
border:2px solid #00e0ff;
background:transparent;
color:#00e0ff;
font-weight:600;
cursor:pointer;
transition:0.3s;
width:100%;
}

.details-btn:hover{
background:#00e0ff;
color:#05070a;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">AutoSphere</div>

    <div class="nav-links">
        <a href="../homepage.html"><div class="nav-item">Home</div></a>
        <a href="../brands.html"><div class="nav-item">Brands</div></a>
        <a href="../emical.html"><div class="nav-item">EMI Calculator</div></a>
        <a href="../compare.html"><div class="nav-item">Compare</div></a>
        <a href="../aboutus.html"><div class="nav-item">About Us</div></a>
    </div>

    <div id="profile-container">
        <a href="../login.html"><div class="profile">Login / Sign Up</div></a>
    </div>
</div>

<div class="page-title">
<h1>Skoda Collection</h1>
<p>Explore the finest Skoda vehicles available at AutoSphere</p>
</div>

<div class="filters">

<input type="text" id="searchInput" placeholder="Search Skoda models...">

<div class="price-filter">
<label>Max Price: ₹ <span id="priceValue">50</span></label>
<input type="range" id="priceSlider" min="10" max="50" value="50">
</div>

</div>

<div class="car-grid">

<!-- Slavia -->
<div class="car-card" data-price="18">
<div class="car-img">
<img src="Sedan/Slavia.jpg">
</div>
<div class="car-content">
<div class="car-title">Skoda Slavia</div>
<div class="car-info">Premium Sedan</div>
<div class="car-price">₹18L</div>
<a href="Sedan/slavia.html">
<button class="details-btn">View Details</button>
</a>
</div>
</div>

<!-- Kodiaq -->
<div class="car-card" data-price="40">
<div class="car-img">
<img src="SUV/Kodiaq.jpg">
</div>
<div class="car-content">
<div class="car-title">Skoda Kodiaq</div>
<div class="car-info">Luxury SUV</div>
<div class="car-price">₹40L</div>
<a href="SUV/kodiaq.html">
<button class="details-btn">View Details</button>
</a>
</div>
</div>

<!-- Kushaq -->
<div class="car-card" data-price="16">
<div class="car-img">
<img src="SUV/Kushaq.jpg">
</div>
<div class="car-content">
<div class="car-title">Skoda Kushaq</div>
<div class="car-info">Compact SUV</div>
<div class="car-price">₹16L</div>
<a href="SUV/kushaq.html">
<button class="details-btn">View Details</button>
</a>
</div>
</div>

</div>

<script>

const searchInput = document.getElementById("searchInput");
const priceSlider = document.getElementById("priceSlider");
const priceValue = document.getElementById("priceValue");
const cars = document.querySelectorAll(".car-card");

function formatPrice(val){
    if(val >= 100){
        return (val/100).toFixed(2).replace(/\.00$/,'') + " Cr";
    }
    return val + " L";
}

priceSlider.oninput = function(){
priceValue.textContent = formatPrice(this.value);
filterCars();
}

searchInput.addEventListener("keyup",filterCars);

function filterCars(){

let searchText = searchInput.value.toLowerCase();
let maxPrice = Number(priceSlider.value);

cars.forEach(car=>{

let title = car.querySelector(".car-title").textContent.toLowerCase();
let price = Number(car.getAttribute("data-price"));

if(title.includes(searchText) && price <= maxPrice){
car.style.display="";
}else{
car.style.display="none";
}

});

}

priceValue.textContent = formatPrice(priceSlider.value);

</script>

</body>
</html>
